<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoeniks — Migrate to Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; background: #f9fafb; }
  h1   { font-size: 20px; margin-bottom: 4px; }
  p    { color: #6b7280; font-size: 14px; margin: 0 0 24px; }
  .card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 24px; margin-bottom: 16px; }
  button { background: #1d4ed8; color: white; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: #1e40af; }
  button:disabled { background: #93c5fd; cursor: default; }
  #log  { font-family: monospace; font-size: 12px; white-space: pre-wrap; background: #111827; color: #d1fae5; border-radius: 8px; padding: 16px; max-height: 400px; overflow-y: auto; margin-top: 16px; }
  .ok   { color: #34d399; }
  .err  { color: #f87171; }
  .info { color: #93c5fd; }
  .step { color: #e5e7eb; font-weight: bold; }
</style>
</head>
<body>

<h1>🔁 Phoeniks → Supabase Migration</h1>
<p>This page reads your localStorage data and uploads it to Supabase. You must already be signed in to the tracker.</p>

<div class="card">
  <p style="margin-bottom:16px">Click the button below to migrate all your jobs, parts and reports from localStorage to Supabase.</p>
  <button id="btn" onclick="runMigration()">Start Migration</button>
</div>

<div id="log" style="display:none"></div>

<script>
const SUPABASE_URL      = 'https://hoeiwbotdkjqzrygmdhs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZWl3Ym90ZGtqcXpyeWdtZGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzM5NDQsImV4cCI6MjA5NTMwOTk0NH0.u9yyk578jkoPv1QQJqZGmRL8A9RoS2prJtW4KnefxZk';

const SK       = 'phoeniks_tracker_v3';
const SK_PARTS = 'phoeniks_parts_v2';
const SK_RPTS  = 'phoeniks_reports_v2';

const logEl = document.getElementById('log');
function line(msg, cls = '') {
  logEl.style.display = 'block';
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

async function runMigration() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  logEl.textContent = '';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check session
  line('── Checking auth session ──', 'step');
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    line('✗ Not signed in. Please sign in to the tracker first, then come back here.', 'err');
    btn.disabled = false;
    return;
  }
  line(`✓ Signed in as ${session.user.email}`, 'ok');

  // Read localStorage
  line('\n── Reading localStorage ──', 'step');
  let jobs = [], partsData = {}, reportsData = [];

  try {
    const raw = localStorage.getItem(SK);
    jobs = raw ? JSON.parse(raw) : [];
    jobs = jobs.filter(j => !String(j.id || '').startsWith('demo-'));
    line(`✓ Jobs: ${jobs.length}`, 'ok');
  } catch(e) { line(`✗ Jobs error: ${e}`, 'err'); }

  try {
    const rp = localStorage.getItem(SK_PARTS);
    partsData = rp ? JSON.parse(rp) : {};
    line(`✓ Parts entries: ${Object.keys(partsData).length}`, 'ok');
  } catch(e) { line(`✗ Parts error: ${e}`, 'err'); }

  try {
    const rr = localStorage.getItem(SK_RPTS);
    reportsData = rr ? JSON.parse(rr) : [];
    line(`✓ Reports: ${reportsData.length}`, 'ok');
  } catch(e) { line(`✗ Reports error: ${e}`, 'err'); }

  if (!jobs.length) {
    line('\n⚠ No jobs found in localStorage. Are you on the right browser/profile?', 'err');
    btn.disabled = false;
    return;
  }

  // Upload jobs
  line('\n── Uploading jobs ──', 'step');
  const jobRows = jobs.map(j => ({
    id: j.id, po: j.po || '', supplier: j.supplier || '',
    ref: j.ref || '', equipment: j.equipment || '',
    po_date: j.poDate || null, status: j.status || 'Incoming Job',
    value: j.value || '', value_untaxed: j.valueUntaxed || '',
    buyer: j.buyer || '', deadline: j.deadline || '',
    priority: j.priority || '', receipt_status: j.receiptStatus || '',
    billing_status: j.billingStatus || '', amount_to_invoice: j.amountToInvoice || '',
    source_doc: j.sourceDoc || '', notes: j.notes || '',
    added_date: j.addedDate || null, history: j.history || [],
  }));

  const CHUNK = 200;
  let ok = 0, fail = 0;
  for (let i = 0; i < jobRows.length; i += CHUNK) {
    const { error } = await sb.from('jobs').upsert(jobRows.slice(i, i + CHUNK), { onConflict: 'id' });
    if (error) { line(`  ✗ Batch ${i}: ${error.message}`, 'err'); fail += CHUNK; }
    else { ok += jobRows.slice(i, i + CHUNK).length; line(`  ✓ ${ok} jobs uploaded`, 'ok'); }
  }

  // Upload parts
  line('\n── Uploading parts ──', 'step');
  const partsRows = Object.entries(partsData)
    .filter(([jobId]) => jobRows.some(j => j.id === jobId))
    .map(([jobId, v]) => ({ job_id: jobId, eta: v.eta || '', notes: v.notes || '' }));
  if (partsRows.length) {
    const { error } = await sb.from('parts').upsert(partsRows, { onConflict: 'job_id' });
    if (error) line(`  ✗ ${error.message}`, 'err');
    else line(`  ✓ ${partsRows.length} parts entries uploaded`, 'ok');
  } else { line('  (none)', 'info'); }

  // Upload reports
  line('\n── Uploading reports ──', 'step');
  if (reportsData.length) {
    const reportRows = reportsData.map(r => ({
      id: r.id, report_date: r.date, open_jobs: r.openJobs || 0,
      done_jobs: r.doneJobs || 0, stuck: r.stuck || 0,
      avg_days: r.avgDays || null, open_value: r.openValue || 0,
      total_jobs: r.totalJobs || 0, by_status: r.byStatus || {},
      attention: r.attention || [],
    }));
    const { error } = await sb.from('reports').upsert(reportRows, { onConflict: 'id' });
    if (error) line(`  ✗ ${error.message}`, 'err');
    else line(`  ✓ ${reportRows.length} reports uploaded`, 'ok');
  } else { line('  (none)', 'info'); }

  line('\n✅ Migration complete! Refresh the tracker to see your data.', 'ok');
  btn.textContent = 'Done ✓';
}
</script>
</body>
</html>
